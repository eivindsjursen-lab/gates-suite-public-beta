name: cache-alpha

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Adjust this to your package manager / install workflow.
      - name: Build cache key string
        id: cache_key
        shell: bash
        run: |
          KEY_STR="node-cache|${{ runner.os }}|$(sha256sum package-lock.json | cut -d ' ' -f1)"
          echo "key_str=$KEY_STR" >> "$GITHUB_OUTPUT"

      - name: Compute key fingerprint
        id: cache_fp
        shell: bash
        env:
          KEY_STR: ${{ steps.cache_key.outputs.key_str }}
        run: |
          KEY_FP=$(printf '%s' "$KEY_STR" | sha256sum | cut -c1-12)
          echo "key_fp=$KEY_FP" >> "$GITHUB_OUTPUT"

      - name: "[cache-step] group=node-cache"
        id: cache_deps
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ steps.cache_key.outputs.key_str }}
          restore-keys: |
            node-cache|${{ runner.os }}|

      - name: "[cache] group=node-cache hit=${{ steps.cache_deps.outputs.cache-hit }} key_fp=${{ steps.cache_fp.outputs.key_fp }} key_hint=npm-cache"
        shell: bash
        run: echo "cache marker emitted"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --if-present

  cache-gate:
    runs-on: ubuntu-latest
    needs: [build-test]
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Cache Health Gate (local bundle)
        id: gate
        uses: ./.github/actions/cache-health-gate
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          mode: warn
          no_baseline_behavior: warn
          baseline_runs: "10"
          baseline_window_days: "14"
          baseline_event_filter: push
          # debug: "true" # enable during onboarding diagnostics only

      - name: Print outputs
        shell: bash
        run: |
          echo "RESULT=${{ steps.gate.outputs.result }}"
          echo "CONFIDENCE=${{ steps.gate.outputs.confidence }}"
          echo "BASELINE_SAMPLES=${{ steps.gate.outputs.baseline_samples }}"
          echo "REASON_CODES=${{ steps.gate.outputs.reason_codes }}"

# Controlled bad-case test (after baseline):
# - add ${{ github.sha }} to KEY_STR in "Build cache key string"
# - keep all other cache settings unchanged
# - verify WARN_HIT_RATE_DROP in PR
