name: cache-alpha

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve pip cache dir
        id: pip_cache_dir
        shell: bash
        run: |
          echo "path=$(python -m pip cache dir)" >> "$GITHUB_OUTPUT"

      # Adjust lock/input files to your repo (pyproject.toml/requirements*.txt/etc.).
      - name: Build pip cache key + fingerprint
        id: keyfp
        shell: bash
        run: |
          KEY_STR="pip|${{ runner.os }}|py311|${{ hashFiles('pyproject.toml') }}"
          KEY_FP=$(printf '%s' "$KEY_STR" | sha256sum | cut -c1-12)
          echo "key_str=$KEY_STR" >> "$GITHUB_OUTPUT"
          echo "key_fp=$KEY_FP" >> "$GITHUB_OUTPUT"

      - name: "[cache-step] group=pip-cache"
        id: pip_cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pip_cache_dir.outputs.path }}
          key: ${{ steps.keyfp.outputs.key_str }}
          restore-keys: |
            pip|${{ runner.os }}|py311|
            pip|${{ runner.os }}|

      - name: "[cache] group=pip-cache hit=${{ steps.pip_cache.outputs.cache-hit }} key_fp=${{ steps.keyfp.outputs.key_fp }} key_hint=pip-py311"
        shell: bash
        run: echo "cache marker emitted"

      - name: Install
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e . || true
          pip install pytest

      - name: Test
        shell: bash
        run: pytest -q || python -m pytest -q

  cache-gate:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ always() }}

    steps:
      - uses: actions/checkout@v4

      - name: Run Cache Health Gate (local bundle)
        id: gate
        uses: ./.github/actions/cache-health-gate
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          mode: warn
          no_baseline_behavior: warn
          baseline_runs: "10"
          baseline_window_days: "14"
          baseline_event_filter: push
          # debug: "true" # enable during onboarding diagnostics only

      - name: Print outputs
        shell: bash
        run: |
          echo "RESULT=${{ steps.gate.outputs.result }}"
          echo "CONFIDENCE=${{ steps.gate.outputs.confidence }}"
          echo "BASELINE_SAMPLES=${{ steps.gate.outputs.baseline_samples }}"
          echo "REASON_CODES=${{ steps.gate.outputs.reason_codes }}"

# Controlled bad-case test (after baseline):
# - add ${{ github.sha }} to KEY_STR in "Build pip cache key + fingerprint"
# - verify WARN_HIT_RATE_DROP in PR
